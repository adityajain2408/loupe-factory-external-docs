site_name: Loupe Factory Docs
site_description: >-
  Loupe Factory is an AI-native operations platform for modern manufacturing and wholesale businesses. Guides for inventory, production, orders, shipments, billing, and more.
site_url: https://docs.loupefactory.com
site_author: Aditya Jain
copyright: Copyright &copy; 2025 Loupe AI, LLC

# Theme configuration
theme:
  name: material
  custom_dir: overrides
  language: en
  favicon: assets/images/favicon.ico
  logo: assets/images/favicon-32x32.png

  # Color palette matching Phoenix theme
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  # Typography matching Phoenix theme
  font:
    text: Nunito Sans
    code: JetBrains Mono

  # Features for professional documentation
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate

  # Icon configuration
  icon:
    repo: material/library
    edit: material/pencil
    view: material/eye
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enabled: !ENV [ENABLE_GIT_PLUGINS, false]
      enable_creation_date: true
      type: timeago

# Customization
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section for reference

# Page tree
nav:
  - Introduction: index.md
  - Getting Started:
    - getting-started/index.md
    - Account Setup: getting-started/account-setup.md
    - Definitions: getting-started/definitions.md
    - Dashboard Overview: getting-started/dashboard-overview.md
    - Industry Starting Points: getting-started/industry-starting-points.md
    - Admin Settings Quick Map: getting-started/admin-settings-quick-map.md
    - Quick Start Guide: getting-started/quick-start-guide.md
  - Platform Guide:
    - platform-guide/index.md
    - Inventory Management: platform-guide/inventory-management.md
    - Production Tracking: platform-guide/production-tracking.md
    - Order Management: platform-guide/order-management.md
    - Invoicing: platform-guide/invoicing.md
    - Shipment Tracking: platform-guide/shipment-tracking.md
    - Customer & Supplier Management: platform-guide/customer-supplier-management.md
    - Employee Management: platform-guide/employee-management.md
    - Reporting & Analytics: platform-guide/reporting-analytics.md
  - Account & Billing:
    - account-billing/index.md
    - Managing Your Account: account-billing/managing-your-account.md
    - AI Credits & Billing: account-billing/ai-credits-billing.md
  - FAQ: faq.md

# Additional configuration
extra:
  version:
    provider: mike
    default: latest

  tag_manager:
    container_id: !ENV [GOOGLE_TAG_MANAGER_ID, ""]

  social:
    - icon: material/linkedin
      name: Loupe Factory on LinkedIn
      link: https://www.linkedin.com/company/loupe-ai/
    - icon: material/twitter
      name: Loupe Factory on X
      link: https://x.com/LoupeFactory
    - icon: material/youtube
      name: Loupe AI on YouTube
      link: https://www.youtube.com/@LoupeAI
    - icon: material/facebook
      name: Loupe Factory on Facebook
      link: https://www.facebook.com/profile.php?id=61587067568622

  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: helpful
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: not_helpful
          note: Thanks for your feedback! Help us improve this page by emailing us at <a href="mailto:support@loupefactory.com">support@loupefactory.com</a>.

  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    cookies:
      analytics: Analytics
