site_name: Loupe Factory Docs
site_description: Documentation for Loupe Factory platform and its features.
site_url: https://docs.loupefactory.com
site_author: Aditya Jain
copyright: Copyright &copy; 2025 Loupe AI, LLC

# Theme configuration
theme:
  name: material
  custom_dir: overrides
  language: en

  # Color palette matching Phoenix theme
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  # Typography matching Phoenix theme
  font:
    text: Nunito Sans
    code: JetBrains Mono

  # Features for professional documentation
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate

  # Icon configuration
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enabled: !ENV [CI, false]
      enable_creation_date: true
      type: timeago
  - git-committers:
      enabled: !ENV [CI, false]
      repository: adityajain2408/loupe-factory-external-docs
      branch: main

# Customization
extra_css:
  - stylesheets/extra.css

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section for reference

# Page tree
nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Account Setup: getting-started/account-setup.md
    - Dashboard Overview: getting-started/dashboard-overview.md
    - Quick Start Guide: getting-started/quick-start-guide.md
  - Platform Guide:
    - platform-guide/index.md
    - Inventory Management: platform-guide/inventory-management.md
    - Production Tracking: platform-guide/production-tracking.md
    - Order Management: platform-guide/order-management.md
    - Invoicing: platform-guide/invoicing.md
    - Shipment Tracking: platform-guide/shipment-tracking.md
    - Customer & Supplier Management: platform-guide/customer-supplier-management.md
    - Employee Management: platform-guide/employee-management.md
    - Reporting & Analytics: platform-guide/reporting-analytics.md
  - Account & Billing:
    - account-billing/index.md
    - Managing Your Account: account-billing/managing-your-account.md
    - AI Credits & Billing: account-billing/ai-credits-billing.md
  - FAQ: faq.md

# Additional configuration
extra:
  version:
    provider: mike
    default: latest

  social:
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/LoupeAI

  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
